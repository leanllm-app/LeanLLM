services:
  postgres:
    image: postgres:16-alpine
    container_name: leanllm-postgres
    environment:
      POSTGRES_USER: leanllm
      POSTGRES_PASSWORD: leanllm
      POSTGRES_DB: leanllm
    ports:
      - "15432:5432"
    volumes:
      - leanllm_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leanllm -d leanllm"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: leanllm-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@leanllm.local
      PGADMIN_DEFAULT_PASSWORD: leanllm
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: ["ui"]

volumes:
  leanllm_pgdata:
